    { regexp = '\b(KMLYP)\s',            caseSensitive = false },
    { regexp = '\b(LB07)\s',             caseSensitive = false },
    { regexp = '\b(PBE38)\s',            caseSensitive = false },
    { regexp = '\b(PBE50)\s',            caseSensitive = false },
    { regexp = '\b(PW91_0)\s',           caseSensitive = false },
    { regexp = '\b(WHPBE0)\s',           caseSensitive = false },
    { regexp = '\b(GAS22)\s',            caseSensitive = false },
    { regexp = '\b(M05)\s',              caseSensitive = false },
    { regexp = '\b(M052X)\s',            caseSensitive = false },
    { regexp = '\b(M06SX)\s',            caseSensitive = false },
    { regexp = '\b(MN15)\s',             caseSensitive = false },
    { regexp = '\b(LC-TMLYP)\s',         caseSensitive = false },
    { regexp = '\b(R2SCAN38)\s',         caseSensitive = false },
    { regexp = '\b(SCAN0)\s',            caseSensitive = false },
    { regexp = '\b(DSD-PBEB95-D3)\s',    caseSensitive = false },
    { regexp = '\b(DSD-PBEB95-D4)\s',    caseSensitive = false },
    { regexp = '\b(MPW2-PLYP)\s',        caseSensitive = false },
    { regexp = '\b(PBE0-2)\s',           caseSensitive = false },
    { regexp = '\b(SOS1-R2SCAN0-DH)\s',  caseSensitive = false },
    { regexp = '\b(SOS1-R2SCAN-CIDH)\s', caseSensitive = false },
    { regexp = '\b(SOS1-R2SCAN-QIDH)\s', caseSensitive = false },
    { regexp = '\b(SOS1-R2SCAN0-2)\s',   caseSensitive = false },
    # Wavefunction Theory
    { regexp = '\b(DMRG)\s', caseSensitive = false },
    # MP2, including arbitrary ordering of prefixes
    { regexp = '\b((?:(?:RI|S[CO]S|OO|DLPNO|F12(?:\/D|D)?)-){0,3}MP2)\s', caseSensitive = false },
    # Coupled-Cluster methods
    { regexp = '\b((?:RI|DLPNO)?-?CCSD(?:\(T1?\))?(?:-F12(?:D|\/D)?(?:\/RI)?)?)\s', caseSensitive = false },
    # LibXC Functionals - This is deliberately left vague.
    { regexp = '\b((?:hyb_)?(?:lda|m?gga)_(?:xc|[xc]{1})_?[a-z0-9_]*)\s' },
    # AutoCI Methods
    { regexp = '\b(AutoCI-(?:(?:C[CI][SDTQ[\]()]{1,5}(?:-[1-9])?|(?:MP[234](?:\(SDQ\))?))))\s', caseSensitive = false },
    # NEVPT2
    { regexp = '\b((?:SC-|RI-|FIC-|DLPNO-)?NEVPT2)\s', caseSensitive = false },
    # CASPT2 and CAS(2)
    { regexp = '\b((?:RI-|DCD-){0,2}CAS(?:PT2|\(2\)))\s', caseSensitive = false },
    # MRCI
    { regexp = '\b((?:M|SO)R(?:CI(?:\+Q)?|ACPF|AQCC|DDCI[123](?:\+Q)?))\s', caseSensitive = false },
    # EOM-CC
    { regexp = '\b((?:EE-|IP-|EA-)?(?:ST)?EOM-(?:DLPNO-)?CCSD)\s', caseSensitive = false },
]

[[default.rules]]
format.preset = "basis"
patterns = [
    # STO-nG
    { regexp = '\b(STO-[0-9]*G)\s' },
    # Pople basis sets
    { regexp = '\b(m?[346]-[23][12]*\+*G(?:\([23]?[dfp]{1,2},?[23]?[dfp]{0,2}\)|\**)?[SP]{0,2})\s', caseSensitive = false },
    # def2 basis sets, some of the AuxJ variants, and all of the AuxC variants
    { regexp = '\b((?:ma-)?def2-m?[STQ]?[ZVPD()]{1,5}(?:\(-f\))?(?:\/J|\/C)?)\s', caseSensitive = false },
    # def2/J, def2/JK, def2/JKsmall, x2c/J, SARC/J
    { regexp = '\b((?:def2|x2c|SARC)(?:\/J|\/JK)(?:small)?)\s', caseSensitive = false },
    # Jensen polarization consistent (pc) basis sets
    { regexp = '\b((?:aug-)?pc[XJH]?S?(?:seg)?-[0-9]?)\s', caseSensitive = false },
    # Correlation Consistent cc-pVnZ basis sets
    { regexp = '\b((?:m?aug-|apr-|may-|ju[nl]-)?cc-p[wC]{0,2}V[DTQ56]?(?:[DTQ56]|\([DTQ56]?\+d\))Z(?:-DK3?)?(?:\/JK|\/C)?)\s', caseSensitive = false },
    # DKH, ZORA, SARC/SARC2 basis sets
    { regexp = '\b((?:ma-)?(?:SARC-|SARC2-)?(?:DKH-|ZORA-){1}(?:def2-)?m?[STQ]?[ZVPD()]{1,5}\(?-?f?\)?(?:\/JK)?)\s', caseSensitive = false },
    # x2c basis sets
    { regexp = '\b(x2c-[STQ][VZ]{1,2}[P()]{1,3}all(?:-2c)?(?:-s)?)\s', caseSensitive = false },
    # ANO-RCC Basis Sets
    { regexp = '\b(ANO-RCC-(?:Full|[DTQ]ZP))\s', caseSensitive = false },
]

[[default.rules]]
format.preset = "block"
patterns = [
    # `%<block-name>`
    # Includes the number 2 for the 2 at the end of `%mp2`
    { regexp = '(%[a-zA-Z2]+)\s?' },
    # end of a block
    { regexp = '\b(end)\s?', caseSensitive = false },
    # the `* xyz` block in ORCA
    { regexp = '\* xyz(?:file)?', caseSensitive = false },
    { regexp = '\*' },
    # Simple input line start.
    { regexp = '!' },
]
