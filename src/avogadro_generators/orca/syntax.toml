[[default.rules]]
format.preset = "basis"
patterns = [
    # STO-nG
    { regexp = '^STO-[0-9]*G$' },
    # Pople sets without parentheses
    { regexp = '^m?[346]-[23]1*\+*G\*{0,2}[SP]{0,2}$' },
    # Pople sets with parentheses
    { regexp = '^[346]-[23]1*\+*G\([23]?[dfp]{1,2},?[23]?[dfp]{0,2}\)$' },
    # def2 basis sets, some of the AuxJ variants, and all of the AuxC variants
    { regexp = '^(?:ma-)?def2-m?[STQ]?[ZVPD()]{1,5}(?:\(-f\))?(?:\/J|\/C)?$' },
    # def2/J, def2/JK, def2/JKsmall, x2c/J, SARC/J
    { regexp = '^(?:def2|x2c|SARC)(?:\/J|\/JK)(?:small)?$' },
    # Jensen polarization consistent (pc) basis sets
    { regexp = '^(?:aug-)?pc[XJH]?S?(?:seg)?-[0-9]?$' },
    # Correlation Consistent cc-pVnZ basis sets
    { regexp = '^(?:m?aug)?(?:apr)?(?:may)?(?:ju[nl]?)?-?cc-p[wC]{0,2}V[DTQ56]?(?:[DTQ56]|\([DTQ56]?\+d\))Z(?:-DK3?)?(?:\/JK|\/C)?$' },
    # DKH, ZORA, SARC/SARC2 basis sets
    { regexp = '^(?:ma-)?(?:SARC-|SARC2-)?(?:DKH-|ZORA-)?(?:def2-)?m?[STQ]?[ZVPD()]{1,5}\(?-?f?\)?(?:\/JK)?$' },
    # x2c basis sets
    { regexp = '^x2c-[STQ][VZ]{1,2}[P()]{1,3}all(?:-2c)?(?:-s)?$' },
    # ANO-RCC Basis Sets
    { regexp = '^ANO-RCC-(?:Full|[DTQ]ZP)$' },
]


