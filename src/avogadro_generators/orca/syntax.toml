[[default.rules]]
format.preset = "comment"
patterns = [
    # ORCA comments can either be any line with a # at the start
    # or it can be any text enclosed by two #'s
    { regexp = '(?:#[^\n]*#|#[^\n]*)' },
]

[[default.rules]]
format.preset = "num_literal"
patterns = [
    { regexp = '\s([-\+]?[\.0-9]+(?:[eEdD][-\+]?[\.0-9]+)?)\b' },
]

