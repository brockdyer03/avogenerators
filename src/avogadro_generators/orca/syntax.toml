[[default.rules]]
format.preset = "keyword"
patterns = [
    # xTB methods
    { regexp = '\b((?:Native-)?GFN[012]-xTB)\s', caseSensitive = false },
    # NDO Methods (ZNNDO, ZINDO, etc.)
    { regexp = '\b(Z[IN][ND]DO\/[12S])\s', caseSensitive = false },
    # SCF and Opt convergence criteria
    { regexp = '\b((?:Sloppy|Loose|Medium|Strong|Tight|VeryTight|Extreme){1}(?:SCF|Opt){1})\s', caseSensitive = false },
    # RHF, UHF, ROHF, RKS, UKS, ROKS
    { regexp = '\b((?:R|U|RO){1}(?:HF|KS){1})\s', caseSensitive = false },
    # Print levels
    { regexp = '\b((?:Mini|Small|Normal|Large){1}Print)\s', caseSensitive = false },
    # DEFGRIDn
    { regexp = '\b(DEFGRID[123]{1})\s', caseSensitive = false },
    # DKHn
    { regexp = '\b(DKH[12]{1})\s', caseSensitive = false },
    # PNO settings
    { regexp = '\b((?:Loose|Normal|Tight){1}PNO)\s', caseSensitive = false },
    # CPCM/SMD/COSMO
    { regexp = '\b((?:CPCMC?|SMD|COSMORS){1}\([\w,-]*\))\s', caseSensitive = false },
    # Avoid capturing RI-<method>
    { regexp = '\b(RI){1}\h', caseSensitive = false},
    # Everything else
    { string = "SP",               caseSensitive = false},
    { string = "EnGrad",           caseSensitive = false},
    { string = "Opt",              caseSensitive = false},
    { string = "OptTS",            caseSensitive = false},
    { string = "Freq",             caseSensitive = false},
    { string = "NumFreq",          caseSensitive = false},
    { string = "MD",               caseSensitive = false},
    { string = "AM1",              caseSensitive = false},
    { string = "PM3",              caseSensitive = false},
    { string = "MNDO",             caseSensitive = false},
    { string = "PrintGap",         caseSensitive = false},
    { string = "PrintMOs",         caseSensitive = false},
    { string = "PrintBasis",       caseSensitive = false},
    { string = "AIM",              caseSensitive = false},
    { string = "XYZFile",          caseSensitive = false},
    { string = "PDBFile",          caseSensitive = false},
    { string = "UNO",              caseSensitive = false},
    { string = "NoPropFile",       caseSensitive = false},
    { string = "KeepTransDensity", caseSensitive = false},
    { string = "COSJXC",           caseSensitive = false},
    { string = "NoCOSX",           caseSensitive = false},
    { string = "NoRI",             caseSensitive = false},
    { string = "RIJCOSX",          caseSensitive = false},
    { string = "NoRIJCOSX",        caseSensitive = false},
